name: Refresh earnings data

on:
  schedule:
    # Weekdays, twice a day. Odd minutes on purpose: GitHub often skips
    # on-the-hour crons under load.
    - cron: "43 10 * * 1-5"   # ~6:43 AM ET, before US market open
    - cron: "43 17 * * 1-5"   # ~1:43 PM ET, midday top-up
  workflow_dispatch: {}   # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pull fresh prices + earnings dates
        run: node refresh.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/live.js; then
            git add data/live.js
            git commit -m "Auto-refresh earnings data $(date -u +%F)"
            git pull --rebase origin main
            git push
          else
            echo "No data changes."
          fi
